 manager\n\n`lgpm` installs `.lgx` packages into a modules directory and scans what is\ninstalled. Build it from the `logos-package-manager` flake and link it as\n`./lgpm`.", "execs": []}, {"md": "### 2.1 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```\n\nThe executable is at `./lgpm/bin/lgpm`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-package-manager/05b2cf853a81cc61d6c6e81b6f2b5ef2a9466c24' into the Git cache...\nthis path will be fetched (422.7 KiB download, 1.1 MiB unpacked):\n  /nix/store/kz84vv01mz83wvffhhhh8vrxb5zqqi9k-logos-package-manager-cli-1.0.0\ncopying path '/nix/store/kz84vv01mz83wvffhhhh8vrxb5zqqi9k-logos-package-manager-cli-1.0.0' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 3: Build and install this execution-zone module\n\nBuild **this** execution-zone module's `.lgx` straight from its flake's\n`#lgx` output and install it into a local `./modules` directory with `lgpm`.\nEvery module built with\n[`logos-module-builder`](https://github.com/logos-co/logos-module-builder)\nexposes a ready-to-install `#lgx`.\n\n> The `` in the URL is what pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested. With\n> no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 3.1 Build the module's .lgx\n\nBuild the `#lgx` output and link it as `./lez-lgx`. (This compiles the\nmodule and the `wallet_ffi` library it depends on through Nix, so the\nfirst build is slow.)\n\n```bash\n# From inside the clone this is simply: nix build '.#lgx'\nnix build 'github:logos-blockchain/logos-execution-zone-module/f3e7055753d9b75d310a2a1a066e7171939e2132#lgx' -o lez-lgx\n```\n\nThe `.lgx` package is now under `./lez-lgx/`:\n\n```bash\nls lez-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-blockchain/logos-execution-zone-module/f3e7055753d9b75d310a2a1a066e7171939e2132#lgx' -o lez-lgx", "status": "fail", "exit_code": 1, "output": "unpacking 'github:logos-blockchain/logos-execution-zone-module/f3e7055753d9b75d310a2a1a066e7171939e2132' into the Git cache...\nerror: syntax error, unexpected '}', expecting ';'\n       at \u00abgithub:logos-blockchain/logos-execution-zone-module/f3e7055\u00bb/flake.nix:8:3:\n            7|     logos-execution-zone.url = \"github:logos-blockchain/logos-execution-zone\"\n            8|   };\n             |   ^\n            9|\n", "note": "exit code 1"}, {"kind": "run", "cmd": "ls lez-lgx/*.lgx", "status": "fail", "exit_code": 2, "output": "ls: cannot access 'lez-lgx/*.lgx': No such file or directory\n", "note": "exit code 2"}]}, {"md": "### 3.2 Seed the modules directory with the bundled capability module\n\n`logos_execution_zone` is loaded through the host's capability layer, so\nthe modules directory also needs the `capability_module` that ships with\n`logoscore`. Copy it across first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Install the .lgx with lgpm\n\nInstall the freshly-built package into `./modules`. `logos_execution_zone`\nis a `core` module, so it goes to `--modules-dir`. The package is unsigned\n(a local dev build), so we pass `--allow-unsigned`.\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file lez-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file lez-lgx/*.lgx", "status": "fail", "exit_code": 1, "output": "Installing from file: lez-lgx/*.lgx... FAILED\nError: Source plugin file does not exist or is not a file: lez-lgx/*.lgx\n", "note": "exit code 1"}]}, {"md": "### 3.4 Confirm the install\n\nScan the directory and confirm the module landed:\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "fail", "exit_code": 0, "output": "Found 1 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \n", "note": "expected 'logos_execution_zone' not found in output"}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `logos_execution_zone`, introspect it, and call several\nof its methods. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-20 18:54:49.524] [warning] [logos] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-20 18:54:49.789] [info] [logos] Module loaded: capability_module\nLogoscore daemon started (pid 4333, instance bd7803587f64)\nDaemon state: /tmp/doctest-test-cgzx31v5/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-cgzx31v5/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 4.3 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":4333,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.4 List discovered modules\n\n`logos_execution_zone` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "fail", "exit_code": 0, "output": "[{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": "expected 'logos_execution_zone' not found in output"}]}, {"md": "### 4.5 Load the module\n\nLoad `logos_execution_zone` into the running daemon:\n\n```bash\nlogoscore load-module logos_execution_zone\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module logos_execution_zone", "status": "fail", "exit_code": 3, "output": "{\"code\":\"MODULE_LOAD_FAILED\",\"known_modules\":[\"capability_module\"],\"message\":\"Failed to load module 'logos_execution_zone'.\",\"status\":\"error\"}\n", "note": "exit code 3"}]}, {"md": "### 4.6 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports\n`loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "fail", "exit_code": 0, "output": "{\"daemon\":{\"pid\":4333,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":0}}\n", "note": "expected 'logos_execution_zone' not found in output"}]}, {"md": "### 4.7 Introspect the module with module-info\n\n`module-info` lists the methods the module exposes \u2014 the same methods you\ncan `call`:\n\n```bash\nlogoscore module-info logos_execution_zone\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info logos_execution_zone", "status": "fail", "exit_code": 3, "output": "{\"code\":\"MODULE_NOT_FOUND\",\"message\":\"Module 'logos_execution_zone' not found.\",\"status\":\"error\"}\n", "note": "exit code 3"}]}, {"md": "### 4.8 Read the module name\n\n`name` returns the module's own identifier \u2014 the simplest possible\nround-trip through the loaded plugin over liblogos' IPC:\n\n```bash\nlogoscore call logos_execution_zone name\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone name", "status": "fail", "exit_code": 4, "output": "{\"code\":\"RPC_FAILED\",\"message\":\"callModuleMethod('logos_execution_zone','name') RPC call failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.9 Read the module version\n\n`version` returns the module's semantic version (`1.0.0`), matching\n`metadata.json`:\n\n```bash\nlogoscore call logos_execution_zone version\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone version", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.version failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.10 Encode an account id to base58\n\n`account_id_to_base58` takes a 32-byte account id as 64 hex characters\nand returns its base58 form. This is a pure encoding helper in\n`wallet_ffi` \u2014 no open wallet and no network required, so it runs\nentirely offline:\n\n```bash\nlogoscore call logos_execution_zone account_id_to_base58 aaaaaaaa...aaaa  # 64 hex chars\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone account_id_to_base58 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.account_id_to_base58 failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.11 Round-trip it back to hex\n\n`account_id_from_base58` is the inverse: feed it the base58 string we just\nproduced and it returns the original 64-hex account id. Encoding then\ndecoding the same id and recovering the input is a deterministic,\nend-to-end proof that the codec \u2014 and the IPC path to this module \u2014 work:\n\n```bash\n# Encode, then decode the result back \u2014 the round-trip returns the input.\nB58=$(logoscore call logos_execution_zone account_id_to_base58 aaaa...aaaa)\nlogoscore call logos_execution_zone account_id_from_base58 \"$B58\"\n```", "execs": [{"kind": "run", "cmd": "ENC=$(./logos/bin/logoscore call logos_execution_zone account_id_to_base58 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa)\nB58=$(printf '%s' \"$ENC\" | sed -n 's/.*\"result\":\"\\([^\"]*\\)\".*/\\1/p')\necho \"encoded: $B58\"\n./logos/bin/logoscore call logos_execution_zone account_id_from_base58 \"$B58\"\n", "status": "fail", "exit_code": 4, "output": "encoded: \n{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.account_id_from_base58 failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.12 Reject malformed base58\n\nDecoding obvious garbage fails cleanly: `account_id_from_base58` returns\nan empty result rather than crashing the module or the daemon:\n\n```bash\nlogoscore call logos_execution_zone account_id_from_base58 '!!!not-base58!!!'\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone account_id_from_base58 '!!!not-base58!!!'", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.account_id_from_base58 failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.13 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.14 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits\nnon-zero, so we add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"bd7803587f64\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
