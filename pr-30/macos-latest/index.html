nstalled module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \nlogos_execution_zone           1.0.0           core       blockchain     \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `logos_execution_zone`, introspect it, and call several\nof its methods. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-19 14:54:57.955] [warning] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-19 14:54:58.316] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: detected LogosProviderPlugin for \"capability_module\"\n[2026-06-19 14:54:58.316] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: registering LogosProviderObject directly for \"capability_module\"\n[2026-06-19 14:54:58.316] [info] [capability_module] [LogosProviderObject] LogosProviderBase::init called\n[2026-06-19 14:54:58.316] [info] [capability_module] [LogosProviderObject] ModuleProxy: created, wrapping LogosProviderObject \"capability_module\"\n[2026-06-19 14:54:58.319] [info] [capability_module] RemoteTransportHost: Created registry host with URL: \"local:logos_capability_module_d36219441a8c\"\n[2026-06-19 14:54:58.319] [info] [capability_module] RemoteTransportHost: Published object: \"capability_module\"\n[2026-06-19 14:54:58.319] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: successfully published \"capability_module\"\n[2026-06-19 14:54:58.557] [info] [capability_module] [LogosProviderObject] Saving token for module: \"capability_module\"\n[2026-06-19 14:54:58.557] [info] Module loaded: capability_module\nLogoscore daemon started (pid 23763, instance d36219441a8c)\nDaemon state: /tmp/doctest-test-1j42mp0u/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-1j42mp0u/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 4.3 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":23763,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"logos_execution_zone\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 4.4 List discovered modules\n\n`logos_execution_zone` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"logos_execution_zone\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "### 4.5 Load the module\n\nLoad `logos_execution_zone` into the running daemon:\n\n```bash\nlogoscore load-module logos_execution_zone\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module logos_execution_zone", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"logos_execution_zone\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.6 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports\n`loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":23763,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"logos_execution_zone\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.7 Introspect the module with module-info\n\n`module-info` lists the methods the module exposes \u2014 the same methods you\ncan `call`:\n\n```bash\nlogoscore module-info logos_execution_zone\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info logos_execution_zone", "status": "pass", "exit_code": 0, "output": "{\"events\":[],\"methods\":[{\"isInvokable\":false,\"name\":\"eventResponse\",\"parameters\":[{\"name\":\"eventName\",\"type\":\"QString\"},{\"name\":\"data\",\"type\":\"QVariantList\"}],\"returnType\":\"void\",\"signature\":\"eventResponse(QString,QVariantList)\"},{\"isInvokable\":true,\"name\":\"initLogos\",\"parameters\":[{\"name\":\"logosApiInstance\",\"type\":\"LogosAPI*\"}],\"returnType\":\"void\",\"signature\":\"initLogos(LogosAPI*)\"},{\"isInvokable\":true,\"name\":\"claim_pinata\",\"parameters\":[{\"name\":\"pinata_account_id_hex\",\"type\":\"QString\"},{\"name\":\"winner_account_id_hex\",\"type\":\"QString\"},{\"name\":\"solution_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"claim_pinata(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"claim_pinata_private_owned_already_initialized\",\"parameters\":[{\"name\":\"pinata_account_id_hex\",\"type\":\"QString\"},{\"name\":\"winner_account_id_hex\",\"type\":\"QString\"},{\"name\":\"solution_le16_hex\",\"type\":\"QString\"},{\"name\":\"winner_proof_index\",\"type\":\"uint64_t\"},{\"name\":\"winner_proof_siblings_json\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"claim_pinata_private_owned_already_initialized(QString,QString,QString,uint64_t,QString)\"},{\"isInvokable\":true,\"name\":\"claim_pinata_private_owned_not_initialized\",\"parameters\":[{\"name\":\"pinata_account_id_hex\",\"type\":\"QString\"},{\"name\":\"winner_account_id_hex\",\"type\":\"QString\"},{\"name\":\"solution_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"claim_pinata_private_owned_not_initialized(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"create_account_public\",\"returnType\":\"QString\",\"signature\":\"create_account_public()\"},{\"isInvokable\":true,\"name\":\"create_account_private\",\"returnType\":\"QString\",\"signature\":\"create_account_private()\"},{\"isInvokable\":true,\"name\":\"list_accounts\",\"returnType\":\"QJsonArray\",\"signature\":\"list_accounts()\"},{\"isInvokable\":true,\"name\":\"get_balance\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"},{\"name\":\"is_public\",\"type\":\"bool\"}],\"returnType\":\"QString\",\"signature\":\"get_balance(QString,bool)\"},{\"isInvokable\":true,\"name\":\"get_balance\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"},{\"name\":\"is_public_str\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"get_balance(QString,QString)\"},{\"isInvokable\":true,\"name\":\"get_account_public\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"get_account_public(QString)\"},{\"isInvokable\":true,\"name\":\"get_account_private\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"get_account_private(QString)\"},{\"isInvokable\":true,\"name\":\"get_public_account_key\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"get_public_account_key(QString)\"},{\"isInvokable\":true,\"name\":\"get_private_account_keys\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"get_private_account_keys(QString)\"},{\"isInvokable\":true,\"name\":\"account_id_to_base58\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"account_id_to_base58(QString)\"},{\"isInvokable\":true,\"name\":\"account_id_from_base58\",\"parameters\":[{\"name\":\"base58_str\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"account_id_from_base58(QString)\"},{\"isInvokable\":true,\"name\":\"sync_to_block\",\"parameters\":[{\"name\":\"block_id\",\"type\":\"uint64_t\"}],\"returnType\":\"int\",\"signature\":\"sync_to_block(uint64_t)\"},{\"isInvokable\":true,\"name\":\"sync_to_block\",\"parameters\":[{\"name\":\"block_id_str\",\"type\":\"QString\"}],\"returnType\":\"int\",\"signature\":\"sync_to_block(QString)\"},{\"isInvokable\":true,\"name\":\"get_last_synced_block\",\"returnType\":\"int\",\"signature\":\"get_last_synced_block()\"},{\"isInvokable\":true,\"name\":\"get_current_block_height\",\"returnType\":\"int\",\"signature\":\"get_current_block_height()\"},{\"isInvokable\":true,\"name\":\"transfer_public\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_hex\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_public(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"transfer_shielded\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_keys_json\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_shielded(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"transfer_deshielded\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_hex\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_deshielded(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"transfer_private\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_keys_json\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_private(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"transfer_shielded_owned\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_hex\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_shielded_owned(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"transfer_private_owned\",\"parameters\":[{\"name\":\"from_hex\",\"type\":\"QString\"},{\"name\":\"to_hex\",\"type\":\"QString\"},{\"name\":\"amount_le16_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"transfer_private_owned(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"register_public_account\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"register_public_account(QString)\"},{\"isInvokable\":true,\"name\":\"register_private_account\",\"parameters\":[{\"name\":\"account_id_hex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"register_private_account(QString)\"},{\"isInvokable\":true,\"name\":\"create_new\",\"parameters\":[{\"name\":\"config_path\",\"type\":\"QString\"},{\"name\":\"storage_path\",\"type\":\"QString\"},{\"name\":\"password\",\"type\":\"QString\"}],\"returnType\":\"int\",\"signature\":\"create_new(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"open\",\"parameters\":[{\"name\":\"config_path\",\"type\":\"QString\"},{\"name\":\"storage_path\",\"type\":\"QString\"}],\"returnType\":\"int\",\"signature\":\"open(QString,QString)\"},{\"isInvokable\":true,\"name\":\"save\",\"returnType\":\"int\",\"signature\":\"save()\"},{\"isInvokable\":true,\"name\":\"get_sequencer_addr\",\"returnType\":\"QString\",\"signature\":\"get_sequencer_addr()\"}],\"name\":\"logos_execution_zone\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 4.8 Read the module name\n\n`name` returns the module's own identifier \u2014 the simplest possible\nround-trip through the loaded plugin over liblogos' IPC:\n\n```bash\nlogoscore call logos_execution_zone name\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone name", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.name failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.9 Read the module version\n\n`version` returns the module's semantic version (`1.0.0`), matching\n`metadata.json`:\n\n```bash\nlogoscore call logos_execution_zone version\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone version", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to logos_execution_zone.version failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "### 4.10 Encode an account id to base58\n\n`account_id_to_base58` takes a 32-byte account id as 64 hex characters\nand returns its base58 form. This is a pure encoding helper in\n`wallet_ffi` \u2014 no open wallet and no network required, so it runs\nentirely offline:\n\n```bash\nlogoscore call logos_execution_zone account_id_to_base58 aaaaaaaa...aaaa  # 64 hex chars\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone account_id_to_base58 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", "status": "pass", "exit_code": 0, "output": "{\"method\":\"account_id_to_base58\",\"module\":\"logos_execution_zone\",\"result\":\"CVDFLCAjXhVWiPXH9nTCTpCgVzmDVoiPzNJYuccr1dqB\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.11 Round-trip it back to hex\n\n`account_id_from_base58` is the inverse: feed it the base58 string we just\nproduced and it returns the original 64-hex account id. Encoding then\ndecoding the same id and recovering the input is a deterministic,\nend-to-end proof that the codec \u2014 and the IPC path to this module \u2014 work:\n\n```bash\n# Encode, then decode the result back \u2014 the round-trip returns the input.\nB58=$(logoscore call logos_execution_zone account_id_to_base58 aaaa...aaaa)\nlogoscore call logos_execution_zone account_id_from_base58 \"$B58\"\n```", "execs": [{"kind": "run", "cmd": "ENC=$(./logos/bin/logoscore call logos_execution_zone account_id_to_base58 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa)\nB58=$(printf '%s' \"$ENC\" | sed -n 's/.*\"result\":\"\\([^\"]*\\)\".*/\\1/p')\necho \"encoded: $B58\"\n./logos/bin/logoscore call logos_execution_zone account_id_from_base58 \"$B58\"\n", "status": "pass", "exit_code": 0, "output": "encoded: CVDFLCAjXhVWiPXH9nTCTpCgVzmDVoiPzNJYuccr1dqB\n{\"method\":\"account_id_from_base58\",\"module\":\"logos_execution_zone\",\"result\":\"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.12 Reject malformed base58\n\nDecoding obvious garbage fails cleanly: `account_id_from_base58` returns\nan empty result rather than crashing the module or the daemon:\n\n```bash\nlogoscore call logos_execution_zone account_id_from_base58 '!!!not-base58!!!'\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call logos_execution_zone account_id_from_base58 '!!!not-base58!!!'", "status": "pass", "exit_code": 0, "output": "{\"method\":\"account_id_from_base58\",\"module\":\"logos_execution_zone\",\"result\":\"\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.13 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.14 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits\nnon-zero, so we add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"d36219441a8c\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
